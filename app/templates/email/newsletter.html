<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
        body {

      font-family: Arial, sans-serif;

      background: #0a0a0a;

      color: #c89b6d;

      padding: 20px;

    }

    .card {

      background: #111;

      border: 1px solid #c89b6d;

      border-radius: 12px;

      padding: 25px;

      text-align: center;

    }

    .logo {

      font-size: 22px;

      font-weight: bold;

      color: #c89b6d;

      margin-bottom: 10px;

    }

    .code {

      margin: 20px 0;

      padding: 12px;

      border-radius: 8px;

      background: #c89b6d;

      color: black;

      font-weight: bold;

      font-size: 18px;

      letter-spacing: 2px;

    }

    .small {

      font-size: 13px;

      opacity: 0.7;

    }
    </style>
    </head>
    <body>
        <div class="card">
            <div class="logo">GLH</div>
            <h2>You're in 🎉</h2>
            <p>Thanks for subscribing to GLH.</p>
            <p>Here's your exclusive discount:</p>
            <div class="code">GLH25</div>
            <p class="small">Use this at checkout for 25% off.</p>

        </body>
    </html>
